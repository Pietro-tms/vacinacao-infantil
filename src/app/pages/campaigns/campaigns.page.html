<ion-header>
  <ion-toolbar>
    <ion-button slot="start" fill="clear" color="primary" routerLink="/home">
      <ion-icon name="arrow-back" color="dark"></ion-icon>
    </ion-button>
    <ion-title> Campanhas </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card *ngFor="let campaign of campaigns" class="campaign-card">
    <ion-card-header>
      <ion-icon name="megaphone" color="secondary"></ion-icon>
      <ion-card-title> {{ campaign.title }} </ion-card-title>
    </ion-card-header>

    <ion-card-content> {{ campaign.description }} </ion-card-content>
  </ion-card>
</ion-content>
